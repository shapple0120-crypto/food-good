<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>메뉴 추천</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 80px;
      background: linear-gradient(to right, #f5f5f5, #e0f7fa);
    }
    h1 { color: #333; }

    select, button {
      padding: 10px 15px;
      margin: 10px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
    }

    button {
      background-color: #4CAF50;
      color: white;
      cursor: pointer;
    }

    button:hover { background-color: #45a049; }

    #result {
      margin-top: 30px;
      font-size: 26px;
      font-weight: bold;
      color: #222;
    }
  </style>
</head>
<body>

  <h1>🍽 음식 메뉴 추천</h1>

  <select id="category">
    <option value="korean">한식</option>
    <option value="chinese">중식</option>
    <option value="western">양식</option>
    <option value="japanese">일식</option>
    <option value="random">아무거나</option>
  </select>

  <br>

  <button onclick="recommendMenu()">추천 받기</button>

  <div id="result">카테고리를 선택하고 추천을 받아보세요!</div>

  <script>
    const menus = {
      korean: [
        "김치찌개","된장찌개","순두부찌개","제육볶음","불고기",
        "비빔밥","돌솥비빔밥","갈비탕","삼계탕","닭갈비",
        "보쌈","족발","김밥","떡볶이","라면",
        "냉면","칼국수","수제비","오징어볶음","닭볶음탕"
      ],
      chinese: [
        "짜장면","짬뽕","탕수육","마라탕","마라샹궈",
        "깐풍기","유린기","양장피","볶음밥","군만두",
        "고추잡채","훠궈","마파두부","라즈지","샤오롱바오"
      ],
      western: [
        "파스타","스테이크","피자","햄버거","리조또",
        "샐러드","오믈렛","토스트","핫도그","치킨",
        "감바스","브런치","샌드위치","크림파스타","라자냐"
      ],
      japanese: [
        "초밥","라멘","돈카츠","우동","소바",
        "규동","텐동","오코노미야끼","타코야끼","가츠동",
        "사케동","에비동","야키니쿠","카레라이스"
      ]
    };

    function recommendMenu() {
      const category = document.getElementById("category").value;
      let selectedMenu;

      if (category === "random") {
        const allMenus = Object.values(menus).flat();
        selectedMenu = allMenus[Math.floor(Math.random() * allMenus.length)];
      } else {
        const list = menus[category];
        selectedMenu = list[Math.floor(Math.random() * list.length)];
      }

      document.getElementById("result").innerText = "추천 메뉴: " + selectedMenu;
    }
  </script>

</body>
</html>
